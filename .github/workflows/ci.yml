name: Store Intelligence CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: retail_user
          POSTGRES_PASSWORD: retail_password
          POSTGRES_DB: store_intel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt
        pip install pytest pytest-cov
        
    - name: Run API Tests
      env:
        DATABASE_URL: postgresql://retail_user:retail_password@localhost:5432/store_intel_test
      run: |
        pytest tests/ --cov=app --cov-report=xml
